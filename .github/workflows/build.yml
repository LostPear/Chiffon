name: Build and Publish Chiffon

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up .NET 8 SDK ─────────────────────────────────────────────
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── 3. Set up MSBuild (Visual Studio Build Tools) ────────────────────
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 4. Restore NuGet packages (includes Windows App SDK / WinUI 3) ───
      - name: Restore NuGet packages
        run: dotnet restore Chiffon/Chiffon.csproj -r win-x64

      # ── 5. Build (Release | x64) ─────────────────────────────────────────
      - name: Build
        run: >
          dotnet build Chiffon/Chiffon.csproj
          -c Release
          -p:Platform=x64
          -p:RuntimeIdentifier=win-x64
          --no-restore

      # ── 6. Publish self-contained output ─────────────────────────────────
      - name: Publish
        run: >
          dotnet publish Chiffon/Chiffon.csproj
          -c Release
          -r win-x64
          -p:Platform=x64
          -p:WindowsAppSDKSelfContained=true
          --self-contained true
          --no-restore
          -o publish/

      # ── 7. Upload artifact ───────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chiffon-win-x64
          path: publish/
          if-no-files-found: error
